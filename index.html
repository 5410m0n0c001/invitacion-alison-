<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f9a8d4" />

  <!-- ── SEO ── -->
  <title>¡Alison cumple 2 años! 🐝</title>
  <meta name="description" content="Cumpleaños de Alison 🐝 — ¡Estás invitado a celebrar este día tan especial!" />
  <meta name="robots" content="index, follow" />

  <!-- ── Open Graph (WhatsApp, Facebook, Telegram…) ── -->
  <meta property="og:type"         content="website" />
  <meta property="og:title"        content="🐝 Cumpleaños de Alison 🎉" />
  <meta property="og:description"  content="Cumpleaños de Alison — ¡Estás invitado a celebrar este día tan especial! Toca para abrir tu invitación." />
  <meta property="og:image"        content="https://5410m0n0c001.github.io/invitacion-alison-/assets/imagen.png" />
  <meta property="og:image:width"  content="1500" />
  <meta property="og:image:height" content="788" />
  <meta property="og:image:alt"    content="Invitación de cumpleaños de Alison" />
  <meta property="og:url"          content="https://5410m0n0c001.github.io/invitacion-alison-/" />
  <meta property="og:locale"       content="es_MX" />
  <meta property="og:site_name"    content="Cumpleaños de Alison" />

  <!-- ── Twitter Card ── -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="🐝 Cumpleaños de Alison 🎉" />
  <meta name="twitter:description" content="Cumpleaños de Alison — ¡Estás invitado a celebrar este día tan especial!" />
  <meta name="twitter:image"       content="https://5410m0n0c001.github.io/invitacion-alison-/assets/imagen.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Quicksand:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:      #f472b6;
      --pink-dark: #db2777;
      --yellow:    #fbbf24;
      --purple:    #a855f7;
      --sky:       #38bdf8;
      --white:     #ffffff;
      --shadow:    rgba(0,0,0,0.25);
    }

    html, body {
      height: 100%;
      background: #1a0a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Quicksand', sans-serif;
      overflow: hidden;
    }

    /* ── STAGE: vertical phone-like viewport ── */
    #stage {
      position: relative;
      width: 100vw;
      max-width: 440px;
      height: 100vh;
      max-height: 780px;
      overflow: hidden;
      border-radius: 0;
      box-shadow: 0 0 60px rgba(244,114,182,0.4);
      background: #000;
    }

    /* ── SCREEN LAYERS ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ═══════════════════════════════
       SCREEN 1 — SOBRE ESTÁTICO
    ═══════════════════════════════ */
    #screen-poster {
      cursor: pointer;
      z-index: 10;
      background: #fffbeb;
      transition: opacity 0.5s ease;
    }

    #screen-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Tap hint shimmer */
    .tap-hint {
      position: absolute;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.92);
      color: var(--pink-dark);
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      padding: 10px 28px;
      border-radius: 50px;
      box-shadow: 0 4px 20px rgba(244,114,182,0.5);
      white-space: nowrap;
      animation: pulse-hint 1.6s ease-in-out infinite;
      z-index: 20;
    }

    @keyframes pulse-hint {
      0%, 100% { transform: translateX(-50%) scale(1);   box-shadow: 0 4px 20px rgba(244,114,182,0.5); }
      50%       { transform: translateX(-50%) scale(1.06); box-shadow: 0 6px 28px rgba(244,114,182,0.8); }
    }

    /* ═══════════════════════════════
       SCREEN 2 — VIDEO SOBRE (apertura)
    ═══════════════════════════════ */
    #screen-sobre {
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      background: #fffbeb;
    }

    #screen-sobre.active {
      opacity: 1;
      pointer-events: all;
    }

    #video-sobre {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ═══════════════════════════════
       SCREEN 3 — ANIMACIÓN INVITACIÓN
    ═══════════════════════════════ */
    #screen-anim {
      z-index: 4;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      background: #87ceeb;
    }

    #screen-anim.active {
      opacity: 1;
      pointer-events: all;
    }

    #video-anim {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ═══════════════════════════════════════════════════
       ELEMENTOS FLOTANTES SOBRE VIDEO-ANIM
    ═══════════════════════════════════════════════════ */

    /* ── Efecto laminado compartido (vidrio holográfico) ──
       Se usa en el botón y en el panel de fecha vertical  */
    .lamina {
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.22) 0%,
        rgba(244,114,182,0.18) 35%,
        rgba(251,191,36,0.14) 65%,
        rgba(255,255,255,0.20) 100%
      );
      backdrop-filter: blur(10px) saturate(1.6);
      -webkit-backdrop-filter: blur(10px) saturate(1.6);
      border: 1.5px solid rgba(255,255,255,0.45);
      /* borde interior tipo brillo laminado */
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.55),
        inset 0 -1px 0 rgba(219,39,119,0.25),
        0 8px 32px rgba(219,39,119,0.45);
    }

    /* ════ BOTÓN UBICACIÓN ════
       Posición: lado derecho, al nivel del rostro de la abeja
       El rostro ocupa ~8%–32% del alto → centro ~20% top
       En 100vh con max 780px → top ~20% del stage             */
    #btn-ubicacion {
      position: absolute;
      top: 19%;          /* centro del rostro de la abeja */
      right: 12px;
      z-index: 40;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100px;
      height: 100px;
      border-radius: 24px;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 0.85rem;
      text-align: center;
      line-height: 1.25;
      text-decoration: none;
      letter-spacing: 0.02em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      /* empieza invisible */
      opacity: 0;
      pointer-events: none;
      transform: scale(0.5);
      transition: transform 0.15s, opacity 0.15s;
    }

    /* Capa de color sólido rosa debajo del laminado
       para que no se pierda el color aunque el fondo cambie */
    #btn-ubicacion::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: linear-gradient(145deg, #f472b6 0%, #db2777 100%);
      z-index: -1;
    }

    #btn-ubicacion.visible {
      opacity: 1;
      pointer-events: all;
      animation: btn-pop 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards,
                 glow-punzante 2s ease-in-out 0.5s infinite;
    }

    /* Pop de entrada */
    @keyframes btn-pop {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* Efecto punzante: glow rosa que pulsa */
    @keyframes glow-punzante {
      0%, 100% {
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.55),
          inset 0 -1px 0 rgba(219,39,119,0.25),
          0 0 0   4px rgba(244,114,182,0),
          0 0 18px 4px rgba(219,39,119,0.5),
          0 8px 32px rgba(219,39,119,0.4);
      }
      50% {
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.55),
          inset 0 -1px 0 rgba(219,39,119,0.25),
          0 0 0  10px rgba(244,114,182,0.25),
          0 0 32px 8px rgba(219,39,119,0.8),
          0 8px 40px rgba(219,39,119,0.6);
      }
    }

    #btn-ubicacion:active {
      transform: scale(0.91) !important;
      animation: none !important;
    }

    #btn-ubicacion svg { flex-shrink: 0; width: 36px; height: 36px; drop-shadow: 0 1px 3px rgba(0,0,0,0.4); }
    #btn-ubicacion .btn-txt { display: block; font-size: 0.82rem; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }

    /* ════ FECHA VERTICAL — columna izquierda ════
       Posicionada al mismo nivel que el botón (top: 19%)
       Texto apilado en vertical, escritura de arriba a abajo  */
    #fecha-vertical {
      position: absolute;
      top: 19%;
      left: 10px;
      z-index: 40;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 14px 12px;
      border-radius: 20px;
      width: 96px;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #fecha-vertical.visible {
      opacity: 1;
      transform: translateX(0);
    }

    /* Capa rosa sólida de respaldo */
    #fecha-vertical::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(219,39,119,0.75) 0%, rgba(168,85,247,0.65) 100%);
      z-index: -1;
    }

    .fv-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      line-height: 1;
    }

    .fv-num {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 3.2rem;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
      line-height: 1;
    }

    .fv-label {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 1px;
    }

    .fv-divider {
      width: 52px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .fv-hora {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 2.1rem;
      color: var(--yellow);
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
      line-height: 1;
      text-align: center;
    }

    .fv-hora-label {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.8);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 1px;
    }

    /* ════ PANEL INFERIOR: CONTADOR REGRESIVO ════
       Elevado con safe-area para no quedar bajo barra de nav  */
    #ui-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 30;
      padding: 16px 10px calc(36px + env(safe-area-inset-bottom, 16px));
      background: linear-gradient(to top,
        rgba(15,2,40,0.93) 0%,
        rgba(15,2,40,0.70) 55%,
        rgba(15,2,40,0.0)  100%
      );
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease 0.3s;
    }

    #ui-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Countdown sublabel ── */
    #cd-label-top {
      text-align: center;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    /* ── Countdown ── */
    #countdown-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
    }

    .cd-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      border-radius: 14px;
      padding: 8px 0;
      flex: 1;
      max-width: 72px;
      /* efecto laminado en los bloques del contador */
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.18) 0%,
        rgba(244,114,182,0.15) 50%,
        rgba(255,255,255,0.18) 100%
      );
      backdrop-filter: blur(10px) saturate(1.5);
      -webkit-backdrop-filter: blur(10px) saturate(1.5);
      border: 1.5px solid rgba(255,255,255,0.40);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.5),
        0 4px 16px rgba(219,39,119,0.3);
    }

    /* Respaldo de color para cd-block */
    .cd-block::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: rgba(100,20,80,0.55);
      z-index: -1;
    }

    .cd-block { position: relative; }

    .cd-num {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 2.4rem;
      color: var(--yellow);
      line-height: 1;
      text-shadow:
        0 0 12px rgba(251,191,36,0.8),
        0 2px 10px rgba(0,0,0,0.6);
    }

    .cd-label {
      font-size: 0.58rem;
      color: rgba(255,255,255,0.92);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .cd-sep {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.8rem;
      color: var(--pink);
      margin-bottom: 14px;
      text-shadow: 0 0 10px rgba(244,114,182,0.7);
      animation: blink-sep 1s step-end infinite;
      flex-shrink: 0;
    }

    @keyframes blink-sep {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    /* ── Mensaje post-evento ── */
    #msg-finished {
      display: none;
      text-align: center;
      padding: 8px;
    }

    #msg-finished p {
      color: var(--yellow);
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    /* ── Responsive pantallas muy pequeñas ── */
    @media (max-height: 620px) {
      .cd-num      { font-size: 1.8rem; }
      .cd-block    { padding: 6px 0; }
      .cd-sep      { font-size: 1.4rem; }
      #btn-ubicacion { width: 64px; height: 64px; top: 16%; right: 8px; }
      #fecha-vertical { top: 16%; left: 7px; width: 46px; }
      .fv-num      { font-size: 1.35rem; }
      .fv-hora     { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<div id="stage">

  <!-- ════ SCREEN 1: Sobre estático ════ -->
  <div id="screen-poster">
    <img src="assets/sobre-poster.jpg" alt="Invitación de Alison" />
    <div class="tap-hint">✉️ Toca para abrir tu invitación</div>
  </div>

  <!-- ════ SCREEN 2: Video del sobre (apertura) ════ -->
  <div id="screen-sobre" class="screen">
    <video id="video-sobre" playsinline webkit-playsinline>
      <source src="assets/sobre.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- ════ SCREEN 3: Animación invitación ════ -->
  <div id="screen-anim" class="screen">
    <video id="video-anim" playsinline webkit-playsinline loop>
      <source src="assets/animacion.mp4" type="video/mp4" />
    </video>

    <!-- ── Fecha vertical — columna izquierda al nivel del rostro ── -->
    <div id="fecha-vertical" class="lamina">
      <div class="fv-item">
        <span class="fv-num">5</span>
        <span class="fv-label">Jul</span>
      </div>
      <div class="fv-divider"></div>
      <div class="fv-item">
        <span class="fv-num">2026</span>
        <span class="fv-label">año</span>
      </div>
      <div class="fv-divider"></div>
      <div class="fv-item">
        <span class="fv-hora">3PM</span>
        <span class="fv-hora-label">hora</span>
      </div>
    </div>

    <!-- ── Botón ubicación — lado derecho al nivel del rostro ── -->
    <a id="btn-ubicacion" class="lamina"
       href="https://share.google/217zwY3bvhmzM4k7h"
       target="_blank"
       rel="noopener noreferrer">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
      </svg>
      <span class="btn-txt">Ver<br>ubicación</span>
    </a>

    <!-- ── Panel inferior: contador regresivo ── -->
    <div id="ui-overlay">

      <p id="cd-label-top">⏳ faltan para la fiesta...</p>

      <div id="countdown-wrap">
        <div class="cd-block">
          <span class="cd-num" id="cd-days">00</span>
          <span class="cd-label">días</span>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-block">
          <span class="cd-num" id="cd-hours">00</span>
          <span class="cd-label">horas</span>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-block">
          <span class="cd-num" id="cd-mins">00</span>
          <span class="cd-label">min</span>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-block">
          <span class="cd-num" id="cd-secs">00</span>
          <span class="cd-label">seg</span>
        </div>
      </div>

      <!-- Mensaje post-evento -->
      <div id="msg-finished">
        <p>🐝 ¡Gracias por celebrar con Alison! 🎉</p>
      </div>

    </div><!-- /ui-overlay -->

  </div><!-- /screen-anim -->

</div><!-- /stage -->

<script>
  /* ─── CONFIG ─── */
  // Fecha y hora del evento: 5 de julio de 2025 a las 15:00 hrs (Veracruz / Ciudad de México)
  const EVENT_DATE = new Date('2026-07-05T15:00:00-06:00');

  /* ─── DOM ─── */
  const screenPoster = document.getElementById('screen-poster');
  const screenSobre  = document.getElementById('screen-sobre');
  const screenAnim   = document.getElementById('screen-anim');
  const videoSobre   = document.getElementById('video-sobre');
  const videoAnim    = document.getElementById('video-anim');
  const uiOverlay    = document.getElementById('ui-overlay');
  const btnUbicacion = document.getElementById('btn-ubicacion');
  const fechaVertical = document.getElementById('fecha-vertical');
  const msgFinished  = document.getElementById('msg-finished');
  const cdDays       = document.getElementById('cd-days');
  const cdHours      = document.getElementById('cd-hours');
  const cdMins       = document.getElementById('cd-mins');
  const cdSecs       = document.getElementById('cd-secs');
  const cdWrap       = document.getElementById('countdown-wrap');

  /* ─── COUNTDOWN ─── */
  function pad(n) { return String(n).padStart(2, '0'); }

  function updateCountdown() {
    const now  = Date.now();
    const diff = EVENT_DATE.getTime() - now;

    if (diff <= 0) {
      // Evento ya pasó
      cdWrap.style.display      = 'none';
      msgFinished.style.display = 'block';
      const lbl = document.getElementById('cd-label-top');
      if (lbl) lbl.style.display = 'none';
      return;
    }

    const totalSecs = Math.floor(diff / 1000);
    const days  = Math.floor(totalSecs / 86400);
    const hours = Math.floor((totalSecs % 86400) / 3600);
    const mins  = Math.floor((totalSecs % 3600) / 60);
    const secs  = totalSecs % 60;

    cdDays.textContent  = pad(days);
    cdHours.textContent = pad(hours);
    cdMins.textContent  = pad(mins);
    cdSecs.textContent  = pad(secs);
  }

  /* ─── FLOW ─── */
  // STEP 1: user taps poster → play sobre video
  screenPoster.addEventListener('click', () => {
    screenSobre.classList.add('active');
    screenPoster.style.opacity = '0';
    screenPoster.style.pointerEvents = 'none';

    videoSobre.play().catch(() => {
      // fallback: just transition
      transitionToAnim();
    });
  });

  // STEP 2: sobre video ends → fade to animation
  videoSobre.addEventListener('ended', () => {
    transitionToAnim();
  });

  function transitionToAnim() {
    screenAnim.classList.add('active');

    setTimeout(() => {
      screenSobre.style.opacity = '0';
      screenSobre.style.pointerEvents = 'none';
    }, 400);

    videoAnim.play().catch(() => {});

    // Show UI slightly before animation ends (at ~7s into 10s video)
    setTimeout(() => {
      uiOverlay.classList.add('visible');
      btnUbicacion.classList.add('visible');
      fechaVertical.classList.add('visible');
      updateCountdown();
      setInterval(updateCountdown, 1000);
    }, 6500);
  }

  /* ─── Preload videos ─── */
  videoSobre.load();
  videoAnim.load();
</script>
</body>
</html>
